[project]
name = "qwenpaw-skillscanner"
version = "0.1.0"
description = "Standalone static security scanner for agent skill packages"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0",
]

[project.scripts]
skillscanner = "skillscanner.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[tool.setuptools]
package-dir = {"" = "src"}
packages = { find = { where = ["src"] } }
include-package-data = true

[tool.setuptools.package-data]
"skillscanner" = [
    "data/*.yaml",
    "rules/signatures/*.yaml",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"
